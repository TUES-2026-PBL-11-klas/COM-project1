apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quiz-platform-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/(.*)
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.apiGateway.name }}
            port:
              number: {{ .Values.apiGateway.port }}