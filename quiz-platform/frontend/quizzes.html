<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wdth,wght@6..144,25..150,1..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="quizzes.css">
    <title>Explore Quizzes — Ministry of Human Testing</title>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li>
                    <h3>Ministry of Human Testing</h3>
                </li>
            </ul>
            <ul>
                <li><a href="quizzes.html" class="secondary">Quizzes</a></li>
                <li><a href="login.html" role="button">Log in</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <hgroup>
            <h1>Explore <mark>Quizzes</mark></h1>
            <p>Discover tests crafted to challenge and grow your mind.</p>
        </hgroup>

        <!--<form role="group">
            <input name="search" type="search" placeholder="Search quizzes…" aria-label="Search quizzes">
            <select name="subject" aria-label="Select subject">
                <option value="" selected>All subjects</option>
                <option value="math">Math</option>
            </select>
            <input type="submit" value="Search">
        </form>-->

        <ul class="quiz-list">
            <li><a href="#" class="quiz-row">
                    <span class="badge badge-science">Science</span>
                    <span class="quiz-title">The Human Body: Systems and Functions</span>
                    <span class="quiz-meta">20 questions</span>
                </a></li>
        </ul>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Authentication check
            try {
                const response = await fetch('/api/users/v1.0/me');
                if (response.ok) {
                    const user = await response.json();
                    const navUl = document.querySelector('nav ul:last-child');
                    navUl.innerHTML = `
                        <li><a href="quizzes.html" class="secondary">Quizzes</a></li>
                        <li><span class="secondary" style="margin-right: 1rem;">Hello, ${user.username}</span></li>
                        <li><a href="#" id="logout-btn" role="button" class="outline">Log out</a></li>
                    `;
                    document.getElementById('logout-btn').addEventListener('click', async (e) => {
                        e.preventDefault();
                        await fetch('/api/users/v1.0/logout', { method: 'POST' });
                        window.location.reload();
                    });
                }
            } catch (err) {
                console.error("Failed to check auth status", err);
            }

            // Logic for Quizzes page
            const subjectSelect = document.querySelector('select[name="subject"]');
            const quizListEl = document.querySelector('.quiz-list');
            const searchForm = document.querySelector('form[role="group"]');
            const searchInput = document.querySelector('input[name="search"]');

            let allSubjects = [];
            let allQuizzes = [];

            // 1. Fetch Subjects
            try {
                const subRes = await fetch('/api/quiz/v1.0/subjects');
                if (subRes.ok) {
                    allSubjects = await subRes.json();

                    // Render subjects into the select dropdown
                    subjectSelect.innerHTML = '<option value="" selected>All subjects</option>';
                    allSubjects.forEach(s => {
                        const opt = document.createElement('option');
                        opt.value = s.id;
                        // Default the text to the subject's name, uppercase first letter
                        opt.textContent = s.name.charAt(0).toUpperCase() + s.name.slice(1);
                        subjectSelect.appendChild(opt);
                    });
                }
            } catch (err) {
                console.error("Failed to fetch subjects:", err);
            }

            // 2. Fetch and Render Quizzes
            async function loadQuizzes(subjectId = "", searchTerm = "") {
                try {
                    quizListEl.innerHTML = '<p style="text-align:center; color: var(--pico-muted-color);">Loading quizzes...</p>';

                    let url = '/api/quiz/v1.0/quizzes';
                    const params = [];
                    if (subjectId) params.push(`subject=${subjectId}`);
                    if (searchTerm) params.push(`search=${encodeURIComponent(searchTerm)}`);

                    const qRes = await fetch(url + (params.length ? '?' + params.join('&') : ''));
                    if (qRes.ok) {
                        allQuizzes = await qRes.json();
                        renderQuizzes(allQuizzes);
                    } else {
                        quizListEl.innerHTML = '<p style="text-align:center; color: var(--pico-del-color);">Error loading quizzes.</p>';
                    }
                } catch (err) {
                    console.error("Failed to fetch quizzes:", err);
                    quizListEl.innerHTML = '<p style="text-align:center; color: var(--pico-del-color);">Connection error.</p>';
                }
            }

            function renderQuizzes(quizzesToRender) {
                quizListEl.innerHTML = '';

                if (quizzesToRender.length === 0) {
                    quizListEl.innerHTML = '<p style="text-align:center; color: var(--pico-muted-color);">No quizzes found.</p>';
                    return;
                }

                quizzesToRender.forEach(q => {
                    // Match subject color if possible
                    const subjectData = allSubjects.find(s => s.id === q.subject_id);
                    const subjectName = subjectData ? subjectData.name : 'General';

                    // Create quiz li
                    const li = document.createElement('li');

                    // Note: passing quiz id to solve.html
                    li.innerHTML = `
                        <a href="solve.html?quiz=${q.id}" class="quiz-row">
                            <span class="badge badge-science">${subjectName.charAt(0).toUpperCase() + subjectName.slice(1)}</span>
                            <span class="quiz-title">${q.title}</span>
                            <span class="quiz-meta">Take Quiz →</span>
                        </a>
                    `;
                    quizListEl.appendChild(li);
                });
            }

            // Initialization load
            loadQuizzes();

            // 3. Search and Filter Form Handling
            searchForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const searchTerm = searchInput.value.trim();
                const selectedSubjectId = subjectSelect.value;

                loadQuizzes(selectedSubjectId, searchTerm);
            });
        });
    </script>
</body>

</html>
