<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wdth,wght@6..144,25..150,1..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="index.css">
    <title>Ministry of Human Testing</title>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li>
                    <h3>Ministry of Human Testing</h3>
                </li>
            </ul>
            <ul>
                <li><a href="quizzes.html" class="secondary">Quizzes</a></li>
                <li><a href="login.html" role="button">Log in</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="hero">
            <h1><mark style="font-variation-settings: 'wdth' 125;">Test your boundaries</mark> <br>to become a better
                human</h1>
            <p class="secondary">Take and create tests designed to challenge your limits and help you become a better
                version of yourself.</p>
            <div class="ctas">
                <a role="button" href="register.html">Get Started</a>
                <a role="button" class="contrast" href="quizzes.html">Explore</a>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/users/v1.0/me');
                if (response.ok) {
                    const user = await response.json();

                    // Update navigation for logged in user
                    const navUl = document.querySelector('nav ul:last-child');
                    navUl.innerHTML = `
                        <li><a href="quizzes.html" class="secondary">Quizzes</a></li>
                        <li><span class="secondary" style="margin-right: 1rem;">Hello, ${user.username}</span></li>
                        <li><a href="#" id="logout-btn" role="button" class="outline">Log out</a></li>
                    `;

                    // Handle logout
                    document.getElementById('logout-btn').addEventListener('click', async (e) => {
                        e.preventDefault();
                        await fetch('/api/users/v1.0/logout', { method: 'POST' });
                        window.location.reload();
                    });
                }
            } catch (err) {
                console.error("Failed to check auth status", err);
            }
        });
    </script>
</body>

</html>
