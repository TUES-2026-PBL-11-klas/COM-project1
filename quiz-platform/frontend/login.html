<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wdth,wght@6..144,25..150,1..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="auth.css">
    <title>Log in — Ministry of Human Testing</title>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li>
                    <h3><a href="index.html" class="secondary">Ministry of Human Testing</a></h3>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <article>
            <header>Log in</header>
            <form>
                <fieldset>
                    <input type="text" name="username" placeholder="Username" autocomplete="username" />
                    <input type="password" name="password" placeholder="Password" autocomplete="current-password" />
                </fieldset>
                <small>Don't have an account? <a href="register.html">Register</a></small>
                <input type="submit" value="Login" />
            </form>
            <p id="error-message" style="color: var(--pico-del-color); font-size: 0.8em; margin-top: 1em;"></p>
        </article>
    </main>

    <script>
        const form = document.querySelector('form');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.textContent = '';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/users/v1.0/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    window.location.href = 'index.html';
                } else {
                    const errorData = await response.json();
                    errorMessage.textContent = errorData.error || 'Login failed';
                }
            } catch (err) {
                errorMessage.textContent = 'Network error occurred';
            }
        });
    </script>
</body>

</html>
